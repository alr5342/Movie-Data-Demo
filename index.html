<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMDb Top 250 — Screening Room</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <section class="landing" id="landing">
    <div class="landing__spotlight" aria-hidden="true"></div>
    <div class="landing__content">
      <div class="marquee">IMDb Top 250</div>
      <h1>Screening Room</h1>
      <p>Sort the films, then dim the ones you’ve already seen.</p>

      <div class="landing__legend">
        <span><i class="dot dot--glow"></i> Unwatched</span>
        <span><i class="dot dot--dim"></i> Watched</span>
        <span><i class="iconMini">◷</i> Length</span>
        <span><i class="iconMini">★</i> Rating</span>
      </div>

      <button class="enterBtn" id="enterBtn" type="button">Enter</button>
    </div>
  </section>

  <main class="wrap">
    <section class="panel controlsPanel">
      <div class="panel__top">
        <button class="btn btn--ghost" id="resetBtn" type="button">Reset</button>
      </div>

      <div class="controls">
        <div class="control">
          <label for="sortSelect">↕</label>
          <select id="sortSelect">
            <option value="rank-asc"># ↑</option>
            <option value="rank-desc"># ↓</option>
            <option value="year-desc">Year ↓</option>
            <option value="year-asc">Year ↑</option>
            <option value="runtime-desc">◷ ↓</option>
            <option value="runtime-asc">◷ ↑</option>
            <option value="title-asc">A → Z</option>
            <option value="title-desc">Z → A</option>
          </select>
        </div>

        <div class="control control--range">
          <div class="range__head">
            <label>Year</label>
            <span class="range__value" id="yearRangeLabel">Any</span>
          </div>
          <div class="range__row">
            <select id="yearMinSelect"></select>
            <span class="range__to">—</span>
            <select id="yearMaxSelect"></select>
          </div>
        </div>

        <div class="control">
          <label>◷</label>
          <div class="checks" id="runtimeChecks"></div>
        </div>

        <div class="control">
          <label>★</label>
          <div class="checks" id="ratingChecks"></div>
        </div>

        <button class="btn btn--primary" id="applyBtn" type="button" disabled>Apply</button>
      </div>
    </section>

    <section class="results">
      <div class="results__top">
        <p class="sub" id="resultsMeta">—</p>
        <div class="chips" id="activeChips"></div>
      </div>

      <div class="grid" id="movieGrid"></div>

      <div class="empty" id="emptyState" hidden>
        <h3>No matches</h3>
        <button class="btn" id="emptyResetBtn" type="button">Reset</button>
      </div>
    </section>
  </main>

  <script src="sketch.js"></script>
</body>
</html>
